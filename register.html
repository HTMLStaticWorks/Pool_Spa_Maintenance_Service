<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <meta name="description" content="Register Client Account - Join AquaElite pool care network, set preferences, and secure digital report tracking.">
  <title>Register - AquaElite Client Portal</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Floating Toggles for Demo Control -->
  <div class="page-top-actions">
    <button class="toggle-btn theme-toggle" aria-label="Toggle Theme">
      <i class="fas fa-moon"></i>
    </button>
    <button class="toggle-btn rtl-toggle" aria-label="Toggle Layout Direction">
      <i class="fas fa-exchange-alt"></i>
    </button>
  </div>

  <section class="auth-page">
    
    <!-- Centered Registration Form -->
    <div class="auth-container">
      <div class="glass-panel auth-card" style="max-width: 520px; padding: 2.5rem;">
        

        
        <!-- Logo for mobile view -->
        <a href="index.html" class="logo auth-logo">
          <i class="fas fa-swimming-pool"></i> AQUA<span>ELITE</span>
        </a>
        
        <h2>Create Client Account</h2>
        <p class="subtitle" style="margin-bottom: 1.5rem;">Fill out the profile details below to request your portal access.</p>
        
        <form class="validated-form" id="registerForm">
          <div class="form-group">
              <label for="regName">Full Name</label>
              <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
              <span class="error-msg">Name is required.</span>
            </div>
            <div class="form-group">
              <label for="regEmail">Email Address</label>
              <input type="email" id="regEmail" class="form-control" placeholder="john@example.com" required>
              <span class="error-msg">Enter a valid email.</span>
            </div>
          
          <div class="form-group">
              <label for="regPhone">Phone Number</label>
              <input type="tel" id="regPhone" class="form-control" placeholder="+1 (555) 000-0000" required>
              <span class="error-msg">Valid phone required.</span>
            </div>
            <div class="form-group">
              <label for="regPass">Create Password</label>
              <div class="password-input-wrapper">
                <input type="password" id="regPass" class="form-control" placeholder="••••••••" required>
                <button type="button" class="eye-toggle-btn" onclick="togglePassword('regPass', this)" aria-label="Toggle password visibility">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <span class="error-msg">Password required.</span>
            </div>

            <div class="form-group">
              <label for="regConfirmPass">Confirm Password</label>
              <div class="password-input-wrapper">
                <input type="password" id="regConfirmPass" class="form-control" placeholder="••••••••" required>
                <button type="button" class="eye-toggle-btn" onclick="togglePassword('regConfirmPass', this)" aria-label="Toggle confirm password visibility">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
              <span class="error-msg">Passwords must match.</span>
            </div>
          
          <!-- 3. Service Preferences -->
          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 0.5rem;">Select Service Preferences</label>
            <div class="service-prefs-grid">
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" checked style="cursor: pointer;"> Weekly Valet Care
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" style="cursor: pointer;"> Chemistry Calibration
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" style="cursor: pointer;"> Heater Repair
              </label>
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" style="cursor: pointer;"> Spa Maintenance
              </label>
            </div>
          </div>
          
          <label style="display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 1.5rem; cursor: pointer;">
            <input type="checkbox" required style="margin-top: 0.2rem; cursor: pointer;"> I accept the Terms of Service & Privacy Policy
          </label>
          
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account <i class="fas fa-user-plus"></i></button>
        </form>
        
        <!-- 5. Login Redirect CTA -->
        <div style="text-align: center; margin-top: 1.5rem;">
          <p style="font-size: 0.9rem;">Already registered? <a href="login.html" style="color: var(--secondary-light); font-weight: 600;">Sign In Here</a></p>
        </div>

        <!-- Social Sign Up -->
        <div style="border-top: 1px solid var(--border-color); margin-top: 1.5rem; padding-top: 1.5rem; text-align: center;">
          <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Or Sign Up With</span>
          <div class="social-login-grid">
            <button class="social-btn"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn"><i class="fab fa-apple"></i> Apple</button>
          </div>
        </div>
        
      </div>
    </div>
    
  </section>

  <!-- JavaScript Bundle -->
  <script src="assets/js/main.js"></script>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
